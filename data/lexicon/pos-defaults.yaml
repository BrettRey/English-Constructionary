# Default mapping rules: source POS (wiktextract pos codes) -> CGEL lexical category.
# Gold lists and adjudications in overrides.yaml take precedence over these defaults.
# NOTE: pos codes are drafted from wiktextract documentation and must be verified
# against an actual kaikki.org dump at first ingest (marked verify-at-ingest).
# CGEL's nine lexical categories: noun, verb, adjective, adverb, preposition,
# determinative, subordinator, coordinator, interjection.

meta:
  status: draft
  verify-at-ingest: true
  updated: 2026-07-16

rules:
  noun-default:
    source-pos: noun
    cgel-category: noun
    subclass: common
    confidence: high

  proper-noun-default:
    source-pos: name
    cgel-category: noun
    subclass: proper
    confidence: high
    notes: "wiktextract tags Wiktionary 'Proper noun' entries as pos: name (verify at ingest). Proper noun (syntactic category) vs proper name (semantic category): see n-proper-001 / proper-name-001."

  verb-default:
    source-pos: verb
    cgel-category: verb
    confidence: high

  adjective-default:
    source-pos: adj
    cgel-category: adjective
    confidence: high
    notes: "Boundary items with preposition-like or determinative-like behaviour (worth, near, due, several) go to adjudication, not this default."

  adverb-default:
    source-pos: adv
    cgel-category: adverb
    confidence: medium
    notes: "A sizeable chunk of traditional adverbs are CGEL intransitive prepositions (outside, abroad, downstairs, home, upstairs...). Exceptional complement-head ago is also a preposition, but not intransitive. These are handled by the preposition gold list, which overrides this rule. Expect this default to be wrong more often than any other."

  preposition-default:
    source-pos: prep
    cgel-category: preposition
    confidence: high

  postposition-default:
    source-pos: postp
    cgel-category: preposition
    confidence: high
    notes: "CGEL treats heads that follow their complements (notwithstanding, ago in ten years ago) as prepositions; linear position is not category. Ago is especially exceptional because it invariably follows its obligatory NP complement (CGEL p. 632)."

  conjunction-no-default:
    source-pos: conj
    cgel-category: null
    confidence: high
    notes: "NO DEFAULT. Traditional 'conjunction' splits three ways in CGEL: coordinator (and, or, but, nor and correlatives), subordinator (a very small class: that, whether, if), and preposition (most traditional 'subordinating conjunctions': because, although, since, while, unless, until, when...). Every conj item must resolve via gold list."

  determiner-default:
    source-pos: det
    cgel-category: determinative
    confidence: high
    notes: "Determinative is the category; determiner is the function. The determinative gold list overrides for items Wiktionary mis-sorts."

  article-default:
    source-pos: article
    cgel-category: determinative
    confidence: high
    notes: "Article is not a CGEL category; the and a(n) are determinatives."

  pronoun-default:
    source-pos: pron
    cgel-category: noun
    subclass: pronoun
    confidence: high
    notes: "CGEL: pronouns are a subclass of noun. Items traditionally called indefinite pronouns (everybody, nothing, anyone...) are compound determinatives; the determinative gold list overrides them."

  numeral-split:
    source-pos: num
    cgel-category: null
    confidence: high
    notes: "NO SINGLE DEFAULT. Per the repo's numerative analysis: basic cardinals and magnitude lexemes such as hundred/thousand/million -> determinative (cardinal-determinative-001 and numerative-magnitude-head-001); larger numeratives are phrases; ordinals -> adjective; fractionals and genuinely nominal uses such as hundreds or numerical labels -> noun. Resolve via gold lists keyed to those entries."

  interjection-default:
    source-pos: intj
    cgel-category: interjection
    confidence: high

  particle-adjudicate:
    source-pos: particle
    cgel-category: null
    confidence: high
    notes: "NO DEFAULT. CGEL has no 'particle' category. Infinitival to, not, verbal particles (up, off in phrasal verbs -> intransitive prepositions) all need adjudication."

  contraction-exclude:
    source-pos: contraction
    cgel-category: null
    confidence: medium
    notes: "Out of scope for the category layer; contractions resolve to their host lexemes."

  multiword-out-of-scope:
    source-pos: [phrase, prep_phrase, proverb]
    cgel-category: null
    confidence: high
    notes: "Not category-layer material; these are candidate CONSTRUCTION entries for data/constructions/ instead. This is the bridge between the lexical layer and the Constructionary proper."

  non-lexical-exclude:
    source-pos: [symbol, character, punct, prefix, suffix, infix, affix]
    cgel-category: null
    confidence: high
    notes: "Symbols, characters, and bound morphemes are not lexical-category bearers in this layer."
