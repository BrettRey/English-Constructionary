        example: "I am going to take these sandwiches for my lunch."
  - lemma: "they"
    pos: pron
    senses:
      - gloss: "\"They\" is used to talk about two or more people, not you or the person you are speaking to."
        example: "I love Josie and Reg. They are nice people."
      - gloss: "\"They\" is used to talk about two or more things."
        example: "Can you get the books for me? They're over there."
      - gloss: "\"They\" is used to talk about one or more person when you don't know the sex or number."
        example: "If a person is fast, they can get there early."
      - gloss: "\"They\" is used to talk about people in general."
        example: "When are they going to finish that new building?"
