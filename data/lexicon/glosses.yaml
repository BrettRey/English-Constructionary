        example: "I thought the window was closed, but it was very much open."
      - gloss: "If something is pretty much impossible, useless, perfect, etc. it is roughly so."
        example: "Your hair looks pretty much perfect the way it is."
  - lemma: "multiple"
    pos: det
    senses:
      - gloss: "Multiple items are more than one item."
        example: "Multiple of the people were confused."
  - lemma: "my"
    pos: pron
    senses:
      - gloss: "My things are things that belong to me."
        example: "Is this my book, or is it yours?"
  - lemma: "myself"
    pos: pron
    senses:
      - gloss: "You use myself when you are the doer and the receiver of an action."
        example: "I taught myself."
