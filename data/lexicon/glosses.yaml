    pos: det
    senses:
      - gloss: "(in, at or to) no place"
        example: "We tried to follow his instructions but we got nowhere."
  - lemma: "o'clock"
    pos: prep
    senses:
      - gloss: "When saying a time, this means that it is zero minutes past the hour. O'clock is almost always given after the number of hours. It is short for of the clock."
        example: "\"What time is it?\" \"It is 6 o'clock.\""
  - lemma: "octillion"
    pos: det
    senses:
      - gloss: "ordinal octillionth) The number 1,000,000,000,000,000,000,000,000,000"
  - lemma: "octodecillion"
    pos: det
    senses:
      - gloss: "The number 10⁵⁷."
  - lemma: "of"
    pos: prep
    senses:
      - gloss: "From."
        example: "His name was Simon of Cyrene."
      - gloss: "Made using."
        example: "It is a house of cards."
      - gloss: "Belonging to."
        example: "Call the office of the school president."
