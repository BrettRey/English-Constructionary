        example: "Since the printer is back online, you should be able to again print from it."
  - lemma: "only"
    pos: prep
    senses:
      - gloss: "You use only to introduce a fact that prevents a statement from being completely true."
        example: "They probably could do it, only you never let them try."
  - lemma: "onshore"
    pos: prep
    senses:
      - gloss: "on or onto the shore"
        example: "He came onshore after five weeks at sea."
  - lemma: "onto"
