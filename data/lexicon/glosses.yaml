        example: "As of November we will be moving to a new location."
  - lemma: "as per"
    pos: prep
    senses:
      - gloss: "in the way that has been decided; following instructions, rules, etc."
        example: "As per your instructions, I left the note on his desk."
      - gloss: "as (usual)"
        example: "As per usual, she arrived at 7:00."
  - lemma: "as soon as"
    pos: prep
    senses:
      - gloss: "beginning at the time with no wait"
        example: "As soon as she heard the news, she began screaming."
  - lemma: "as though"
    pos: prep
    senses:
      - gloss: "the same way that it would be if"
        example: "It could look as though we're trying to hide something."
  - lemma: "as to"
    pos: prep
    senses:
      - gloss: "You use as to to identify the topic."
        example: "They were not clear as to when it would end."
  - lemma: "as well as"
    pos: conj
    senses:
      - gloss: "You use as well as to add more information."
        example: "He uses his web page to advertise his products as well as provide information about his hobby."
  - lemma: "ashore"
    pos: prep
    senses:
      - gloss: "on or onto the shore"
        example: "He came ashore after five weeks at sea."
  - lemma: "aside"
    pos: prep
    senses:
      - gloss: "If you put something aside, you put it to the side, often because you want to use it later."
        example: "We put some money aside for the children's education."
      - gloss: "You use something aside to leave that thing out of the topic."
        example: "The lies aside, they're good workers."
  - lemma: "assuming"
    pos: prep
    senses:
      - gloss: "You use assuming (that) to say what would happen if something is true."
        example: "That's good, assuming it's works."
  - lemma: "at"
    pos: prep
    senses:
      - gloss: "Used to say where something is, or when saying something's position"
        example: "I am at home."
      - gloss: "Used to say the time at which something happened or will happen"
        example: "Breakfast is at 9 o'clock."
      - gloss: "Used to direct attention towards a state, event, or detail"
        example: "Look at how lucky we are."
      - gloss: "Used to say something's state"
        example: "At half price!"
  - lemma: "atop"
    pos: prep
    senses:
      - gloss: "If x is atop y, x is on the highest part of y."
        example: "He stood atop the mountain and looked all around."
  - lemma: "away"
    pos: prep
    senses:
      - gloss: "When something moves away from something else, the distance between them gets bigger. They are no longer near or close."
        example: "Go away! You're bothering me."
  - lemma: "awry"
    pos: prep
    senses:
      - gloss: "If something goes awry, it doesn't work as it's supposed to."
        example: "Unfortunately, it looks like our plans have gone awry."
  - lemma: "back"
    pos: prep
    senses:
      - gloss: "Toward the rear."
        example: "He went back behind the stands."
      - gloss: "To a place again."
        example: "I didn't like it, so I sent it back."
  - lemma: "backstage"
    pos: prep
    senses:
