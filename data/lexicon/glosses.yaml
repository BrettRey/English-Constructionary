        example: "Certain problems can be solved with very simple maths."
  - lemma: "chez"
    pos: prep
    senses:
      - gloss: "At the home of."
        example: "The painting remains chez Catherine and Stephane De Beyrie."
  - lemma: "circa"
    pos: prep
    senses:
      - gloss: "on or around a particular date"
        example: "The city was built circa 1200 BCE."
  - lemma: "clear"
    pos: prep
    senses:
      - gloss: "Out of, away from, especially too far away to be noticed or caught."
        example: "After a short walk, we were clear of the town."
  - lemma: "close"
    pos: prep
    senses:
      - gloss: "When two things are close, they are near each other; the distance or time between them is small."
        example: "The bank is close to the store."
  - lemma: "closer"
    pos: prep
    senses:
      - gloss: "The comparative form of close; more close."
  - lemma: "closest"
    pos: prep
    senses:
      - gloss: "The superlative form of close; most close."
  - lemma: "come"
    pos: prep
    senses:
      - gloss: "When something happens or arrives."
        example: "We'll talk again come January."
  - lemma: "compared"
    pos: prep
    senses:
      - gloss: "Compared to is used to show the difference between two things."
        example: "Compared to the ideas of previous generations, there is a shift in the theory."
  - lemma: "concerning"
