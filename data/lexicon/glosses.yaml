  - lemma: "about"
    pos: prep
    senses:
      - gloss: "You use about to say what subject something is related to."
        example: "Let's not talk about her problems."
      - gloss: "If something moves about, it moves in many directions."
        example: "He walked about the place, looking everywhere."
