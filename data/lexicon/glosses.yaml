        example: "Would you like some grapes?"
      - gloss: "Unspecified or unknown."
        example: "I've just met some man who said he knew you."
      - gloss: "You use some before a number to say that it may be a little more or a little less."
        example: "Some 200 people attended the event."
  - lemma: "somebody"
    pos: det
    senses:
      - gloss: "Somebody is a person."
        example: "I think I saw somebody outside."
  - lemma: "someday"
    pos: det
    senses:
      - gloss: "If something will happen someday, it will happen at some time in the future."
        example: "I hope that someday you can understand how you've hurt me."
  - lemma: "someone"
    pos: det
    senses:
      - gloss: "A person"
        example: "I heard someone at the door."
  - lemma: "something"
    pos: det
    senses:
      - gloss: "A thing"
        example: "I'm going to wear something today."
      - gloss: "An event"
        example: "Isn't something going to happen?"
      - gloss: "A certain object."
        example: "You're really something!"
  - lemma: "sometime"
    pos: det
    senses:
      - gloss: "You use sometime for a time in the future or the past that is unknown or undecided."
        example: "We should get together sometime soon."
      - gloss: "A sometime editor, president, minister, etc. is someone who used to be in that position."
        example: "Downey's uncle is a sometime actor and screenwriter."
      - gloss: "A sometime actor, friend, teacher, etc. is someone who is not usually in that position."
        example: "Jackson was a teacher and sometime actor who appeared in many TV commercials."
  - lemma: "somewhat"
    pos: det
    senses:
      - gloss: "a little, not very"
        example: "What happens in the classroom can be somewhat different from the lesson plan."
  - lemma: "somewhere"
