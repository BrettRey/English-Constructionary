        example: "Be careful children. You'll hurt yourselves."
      - gloss: "Use for emphasis."
        example: "Don't pretend you don't know. You yourselves have seen these kinds of problems."
      - gloss: "If you do something by yourselves, you do it alone."
        example: "That's beautiful, boys. Did you make it by yourselves?"
      - gloss: "If you don't feel yourself, you are different from usual, because you are sick, scared, stressed, etc."
  - lemma: "zero"
    pos: det
    senses:
      - gloss: "Zero is a count of nothing, the number before one. It is often written 0."
        example: "It's zero degrees."
      - gloss: "Zero is also used with an uncountable noun."
        example: "I have zero food left."
  - lemma: "à la"
    pos: prep
    senses:
      - gloss: "à la refers to being according to, or in the style of something."
        example: "I hadn't cooked tomatoes à la crème in a long time."
