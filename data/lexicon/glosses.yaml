        example: "Thanks to your help, we were able to finish quickly."
  - lemma: "that"
    pos: conj
    senses:
      - gloss: "You use that to mark a clause as subordinate."
        example: "You said that you liked me."
  - lemma: "that"
    pos: det
    senses:
      - gloss: "Used to show which thing we are talking about; used with things that are not close to the speaker."
        example: "Give me that book, not this one."
  - lemma: "the"
    pos: det
    senses:
      - gloss: "Used when your listener will know which one you mean."
        example: "Compare \"I went into a room.\" and \"I went into the kitchen.\""
      - gloss: "Used with a stress, to show that the word following is special."
        example: "Are you the John Smith that I went to school with?"
      - gloss: "Used with an adjective that acts like a noun to mean all of the people or things concerned."
        example: "The poor need our help."
      - gloss: "Used with superlatives forms of adjectives and adverbs."
        example: "You are the best."
  - lemma: "thee"
    pos: pron
    senses:
