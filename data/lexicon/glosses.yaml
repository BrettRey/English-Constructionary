    senses:
      - gloss: "ordinal thirty-seventh) The number 37."
        example: "There are thirty-seven tennis balls in the basket."
  - lemma: "thirty-six"
    pos: det
    senses:
      - gloss: "ordinal thirty-sixth) The number 36."
        example: "There are thirty-six tennis balls in the basket."
  - lemma: "thirty-three"
    pos: det
    senses:
      - gloss: "ordinal thirty-third) The number 33."
