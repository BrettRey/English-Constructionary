    pos: det
    senses:
      - gloss: "The number 10⁶⁰."
  - lemma: "now"
    pos: prep
    senses:
      - gloss: "You use now when you want to say that something is true at this time. It is also used for things a short time in the future or a short time in the past."
        example: "I had many problems before, but I'm OK now."
      - gloss: "You use now at the beginning of a sentence to get people's attention."
        example: "Now, I'd like to hear from other people too."
      - gloss: "You use now to refer to the present time, often in contrast to a time in the past or the future."
        example: "Now is the time when we must all live as economically as possible."
      - gloss: "You use now to indicate that an event has occurred and as a result something else may or will happen."
        example: "I’m going to relax now the school year is over."
