        example: "That's not their car, it's ours."
  - lemma: "theirs"
    pos: pron
    senses:
      - gloss: "If something is theirs, it belongs to them."
        example: "This book isn't mine, it's theirs."
  - lemma: "them"
    pos: pron
    senses:
      - gloss: "Other people; not you or the people you are talking to."
        example: "I saw my friends and said, \"hi\" to them."
      - gloss: "Things."
        example: "I made a lot of things. This is one of them."
      - gloss: "You use them to talk about one person, if you don't know who that person is."
        example: "If somebody comes, help them."
  - lemma: "them all"
    pos: pron
    senses:
      - gloss: "You use them all to emphasize that you are talking to or about 100% of those being addressed."
        example: "We have to make this better for them all."
  - lemma: "them both"
    pos: pron
    senses:
      - gloss: "You use them both to emphasize that you are talking about two things or people together."
        example: "Can you give it to them both?"
  - lemma: "themself"
    pos: pron
    senses:
      - gloss: "Another form of themselves, used when the subject is a single person, while themselves is used for singular or plural."
        example: "Someone could hurt themself."
  - lemma: "themselves"
    pos: pron
    senses:
      - gloss: "You use themselves when the people doing an action and the people receiving an action are the same people, but they are not you or the person you're talking to."
        example: "They've hurt themselves."
      - gloss: "Use for emphasis, when talking about more than one person or about one person when you don't know who that person is."
        example: "The classes are as different as the students themselves."
      - gloss: "If somebody or some people do something by themselves, they do it alone."
        example: "The children earned $500 by themselves. I didn't help."
      - gloss: "If somebody or some people don't feel themselves, they are different from usual, because they are sick, scared, stressed, etc."
