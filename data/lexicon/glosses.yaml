        example: "A terrible storm moved inland off the Pacific Ocean."
  - lemma: "inside"
    pos: prep
    senses:
      - gloss: "If x is or moves inside y, it is in y."
        example: "He locked his keys inside his car."
  - lemma: "instead"
    pos: prep
    senses:
      - gloss: "x instead of y means: not y but x."
        example: "I'll have water instead of coffee, thanks."
