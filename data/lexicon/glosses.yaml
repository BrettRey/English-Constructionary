    senses:
      - gloss: "You use x minus y to show that y is taken away from x."
        example: "Five minus three is two. (5-3=2)"
  - lemma: "modulo"
    pos: prep
    senses:
      - gloss: "Given a specified modulus of."
        example: "21 and 84 are congruent to each other modulo 9, since both numbers leave the same remainder, 3, when divided by 9."
