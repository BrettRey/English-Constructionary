    senses:
      - gloss: "Closer."
  - lemma: "nearest"
    pos: prep
    senses:
      - gloss: "closest to."
  - lemma: "neither"
    pos: det
    senses:
      - gloss: "Not one or the other; not either; none of two things."
        example: "Neither definition seems correct."
  - lemma: "next"
    pos: det
    senses:
      - gloss: "The next thing is the one after this one."
        example: "I saw her again the next day."
      - gloss: "The next place is the one beside, or on the other side of this one."
        example: "No, this is number 12, number 14 is the next house."
      - gloss: "Next week, month, year, etc. is the one that follows this one."
        example: "I'll see you again next week."
      - gloss: "Next is used with a superlative adjective to denote what follows in the specified order."
        example: "The next best thing to flying is gliding."
  - lemma: "next"
    pos: prep
    senses:
      - gloss: "After something in order."
        example: "Next, we have the 6:00 news."
      - gloss: "The time after this one."
        example: "The woman was next seen in the office 4 days later."
      - gloss: "Beside something."
        example: "She stood next to the window."
  - lemma: "nine"
    pos: det
    senses:
      - gloss: "ordinal ninth) Nine is the number that is after eight and before ten. It can be written as 9."
        example: "Children study in school about nine months a year."
  - lemma: "nineteen"
    pos: det
    senses:
      - gloss: "ordinal nineteenth) Nineteen is the number that is after eighteen and before twenty. It can also be written as 19."
        example: "Nineteen ducks swim on the lake."
  - lemma: "ninety"
    pos: det
    senses:
      - gloss: "ordinal ninetieth) Ninety is an even number. In numerals, it is 90."
        example: "Ninety years ago, things were different."
