      - gloss: "If you're off some medicine, you are not using it any more."
        example: "He's been off the pain killers for a few weeks."
  - lemma: "offshore"
    pos: prep
    senses:
      - gloss: "In the sea, away from the shore."
        example: "The men worked on an offshore oil rig."
  - lemma: "on"
    pos: prep
    senses:
      - gloss: "positioned at the upper surface of, touching from above"
        example: "The apple is on the table."
      - gloss: "at the date of"
        example: "Tim was born on the 4th of July."
      - gloss: "to an operating state"
        example: "I turned the television on."
      - gloss: "along, forwards (continuing an action)"
        example: "Shall we stop for lunch or shall we drive on?"
  - lemma: "on account"
    pos: prep
    senses:
      - gloss: "because of something bad or difficult"
        example: "He couldn't read it on account of his bad eyes."
