    senses:
      - gloss: "If x is on top of y, x is on the highest part of y."
        example: "I can't get the book. It's on top of the bookcase."
      - gloss: "If x is on top of y, x in control of y or knows about y."
        example: "There's a lot to learn, but I think I'm on top of it so far."
      - gloss: "if x happens on top of y, they both happen."
        example: "On top of all the problems I had yesterday, my car broke down."
  - lemma: "once"
    pos: det
    senses:
      - gloss: "one time"
        example: "We go to the house once a year."
      - gloss: "at a time in the past, but not now"
        example: "It was hard to believe that once we had been friends."
  - lemma: "once"
    pos: prep
    senses:
      - gloss: "after"
        example: "Once I've finished cleaning up, we can leave."
  - lemma: "one"
    pos: det
    senses:
      - gloss: "ordinal first) The number 1."
        example: "We have one nose and one mouth."
  - lemma: "one"
    pos: pron
    senses:
      - gloss: "One is a singular pronoun which means someone or people. It is used more often in formal writing."
        example: "It is easy to see the difference if one looks closely enough."
  - lemma: "one another"
    pos: pron
    senses:
      - gloss: "Each of a group of more than two people or things to the others."
        example: "The army recruits helped one another get through the first few difficult days."
  - lemma: "oneself"
    pos: pron
    senses:
      - gloss: "Oneself is a word that stands in for words like \"myself\", \"himself\", and \"herself\". It is meant to refer to people in general, nobody in particular."
        example: "It's a good idea to check oneself in the mirror before going outside."
