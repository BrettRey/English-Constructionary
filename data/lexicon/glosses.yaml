    pos: det
    senses:
      - gloss: "A larger amount."
        example: "He does more work than I do."
  - lemma: "most"
    pos: det
    senses:
      - gloss: "The majority of; much of; > 50%."
        example: "She does the most cleaning, but the least cooking."
      - gloss: "The largest amount of."
        example: "Bob knows the most about cooking."
  - lemma: "much"
    pos: det
    senses:
      - gloss: "a lot of; a large amount of; a high degree"
        example: "I don't have much money."
