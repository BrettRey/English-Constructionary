    senses:
      - gloss: "no person"
  - lemma: "nobody"
    pos: det
    senses:
      - gloss: "no person"
        example: "Nobody would do something like that."
  - lemma: "none"
    pos: det
    senses:
      - gloss: "Not any."
        example: "I looked to see how many coins I had, but I had none."
  - lemma: "nonillion"
    pos: det
    senses:
      - gloss: "ordinal nonillionth) The number 1,000,000,000,000,000,000,000,000,000,000"
  - lemma: "nor"
    pos: conj
    senses:
      - gloss: "Used to show two things that are both untrue or do not happen."
        example: "He was calm, neither happy nor sad."
  - lemma: "north"
    pos: prep
    senses:
      - gloss: "In the direction north; towards the north"
        example: "The place you want is two miles north of here."
  - lemma: "northeast"
    pos: prep
    senses:
      - gloss: "In the direction northeast; to the northeast."
        example: "It is about twenty miles northeast of San Francisco."
  - lemma: "northward"
    pos: prep
    senses:
      - gloss: "Moving or facing north."
  - lemma: "northwards"
    pos: prep
    senses:
      - gloss: "moving or facing north."
  - lemma: "nothing"
    pos: det
    senses:
      - gloss: "Not anything. Without any things."
        example: "I bought nothing in the shop, because it was closed."
      - gloss: "Empty. An area has nothing in it if it has no objects in it."
        example: "An empty cup has nothing in it."
      - gloss: "Without anything useful or interesting."
        example: "I looked for the book, but I could see nothing."
  - lemma: "notwithstanding"
    pos: prep
    senses:
      - gloss: "If something is true notwithstanding something else, it is true in spite of that other thing."
        example: "We're going ahead with the event as planned, notwithstanding the heavy rain and wind."
