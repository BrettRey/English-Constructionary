  - lemma: "backward"
    pos: prep
    senses:
      - gloss: "If something is backward, it is facing the back."
  - lemma: "backwards"
    pos: prep
    senses:
      - gloss: "If something is backwards, it is facing the back."
  - lemma: "bar"
    pos: prep
    senses:
      - gloss: "except; not including"
        example: "He's the fastest runner in the world bar none."
  - lemma: "barring"
    pos: prep
    senses:
      - gloss: "unless something happens or is true."
        example: "Barring a big change in popular opinion, he should become the next president."
  - lemma: "because"
    pos: prep
    senses:
      - gloss: "You use because to show the reason for something."
        example: "I bought the book because I wanted to read it."
  - lemma: "before"
    pos: prep
    senses:
      - gloss: "If x happens before y, x happens first and y happens second."
        example: "He worked in a gas station before he became famous."
      - gloss: "in front of something"
        example: "She stood before him, looking into his eyes."
      - gloss: "until"
        example: "It took a few moments before I realized that she was joking."
  - lemma: "beforehand"
    pos: prep
    senses:
      - gloss: "Before something else happens."
        example: "You should have told me about the presentation beforehand. I haven't even prepared."
  - lemma: "behind"
    pos: prep
    senses:
      - gloss: "When something is behind a second thing, the first thing is in back of the second."
        example: "The ball is behind the box."
      - gloss: "When something is behind, it is toward the rear."
        example: "The man stayed behind."
      - gloss: "A thing is behind when it happened in the past."
        example: "We left that worry behind."
  - lemma: "being"
    pos: prep
    senses:
      - gloss: "You use being to show the reason for something."
        example: "The mother is very happy, being that her son has become a college student."
  - lemma: "below"
    pos: prep
    senses:
      - gloss: "At a lower position"
  - lemma: "beneath"
    pos: prep
    senses:
      - gloss: "At a lower position."
        example: "The book is beneath the table."
  - lemma: "beside"
    pos: prep
    senses:
      - gloss: "If x is beside y, it is close to y, but not in front or behind."
        example: "The book is beside the table."
  - lemma: "besides"
    pos: prep
    senses:
      - gloss: "In addition (to); as well (as)."
        example: "We've got a pile of homework and a part time job besides."
      - gloss: "Other than; except for."
        example: "I don't want to go anywhere besides China."
  - lemma: "between"
    pos: prep
    senses:
      - gloss: "If x is between y and z, y is on one side of x and z is on the other side."
        example: "Georgia is between North Carolina and Florida."
  - lemma: "betwixt"
    pos: prep
    senses:
      - gloss: "between"
  - lemma: "beyond"
    pos: prep
    senses:
      - gloss: "If x is beyond y, it is on the far side of y."
        example: "He went beyond the mountains, into the woods."
  - lemma: "billion"
    pos: det
    senses:
      - gloss: "ordinal billionth) The number 1,000,000,000 (or 1,000,000,000,000 in old British usage)."
        example: "In 2006, China had about 1.3 billion people."
  - lemma: "both"
    pos: det
    senses:
      - gloss: "When there are two things, both is the first thing and the second thing."
        example: "Jim took both the apple and the orange."
  - lemma: "but"
    pos: conj
    senses:
      - gloss: "You use but to join two ideas and show that they are not the same."
        example: "I would take you there, but I do not have my car."
      - gloss: "You use but to change the topic."
        example: "I understand. And I'm sorry. But there is nothing I can do about it now."
  - lemma: "but"
    pos: prep
    senses:
      - gloss: "except"
        example: "He ate everything but the meat."
  - lemma: "by"
    pos: prep
    senses:
      - gloss: "near or next to."
        example: "The mailbox is by the bus stop."
      - gloss: "at some time before (the given time)."
        example: "Be back by ten o'clock!"
      - gloss: "if something is done by somebody, it is done through their action"
        example: "The matter was decided by the chairman."
      - gloss: "if something is created by somebody, they are the creator, author, etc."
        example: "There are many well-known plays by William Shakespeare."
  - lemma: "by virtue"
    pos: prep
    senses:
      - gloss: "If x happens or is true by virtue of y, x is because of y."
        example: "He became popular by virtue of the way he handled the issues."
  - lemma: "ceilingward"
    pos: prep
    senses:
      - gloss: "Moving in the direction of or facing the ceiling."
  - lemma: "ceilingwards"
    pos: prep
    senses:
      - gloss: "moving or facing the ceiling."
  - lemma: "centillion"
    pos: det
    senses:
      - gloss: "The number 10³⁰³."
  - lemma: "certain"
    pos: det
    senses:
