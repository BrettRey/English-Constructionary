    senses:
      - gloss: "from off to on"
        example: "He walked along pier and onto the ship."
  - lemma: "onward"
    pos: prep
    senses:
      - gloss: "moving or facing forward."
  - lemma: "onwards"
    pos: prep
    senses:
      - gloss: "Moving or facing forward."
        example: "The explorers moved onwards, ever deeper into the jungle."
  - lemma: "opposite"
    pos: prep
    senses:
      - gloss: "If A is opposite B, they are facing each other."
        example: "The bank is just opposite this hotel, right across the street there."
  - lemma: "or"
