        example: "According to a friend of mine, they are thinking of building a new mall near here."
  - lemma: "across"
    pos: prep
    senses:
      - gloss: "To the other side."
        example: "I walked across the bridge."
      - gloss: "On the other side."
        example: "I can see him across the street."
      - gloss: "Crossing, on both sides of."
        example: "The bridge is across the stream."
  - lemma: "adjacent"
    pos: prep
    senses:
      - gloss: "If x is adjacent to y, there is no other thing between x and y."
        example: "The cinema was immediately adjacent to our house, so that every night we could hear the film."
  - lemma: "adrift"
    pos: prep
    senses:
      - gloss: "If something is adrift, it is floating with no control of its direction."
        example: "The boat was adrift for three days before it was found with nobody aboard."
  - lemma: "afloat"
    pos: prep
    senses:
      - gloss: "If something is afloat, it is on the water; floating."
        example: "Although he couldn't swim, the life jacket kept him afloat."
  - lemma: "aft"
    pos: prep
    senses:
      - gloss: "At, close to, or towards the rear of a boat or plane."
        example: "They spent their evening on the ship's deck. One stood fore, the other aft."
  - lemma: "after"
    pos: prep
    senses:
      - gloss: "Behind something in place or position."
        example: "\"B\" comes after \"A\" in the alphabet."
      - gloss: "Later in time."
        example: "He came home after Jane did."
  - lemma: "afterward"
    pos: prep
    senses:
      - gloss: "If something happens afterward, it happens after the time that you are talking about."
        example: "Joe went to the bank. Afterward he went to the store."
  - lemma: "afterwards"
    pos: prep
    senses:
      - gloss: "If something happens afterwards, it happens after the time that you are talking about."
  - lemma: "again"
    pos: prep
    senses:
      - gloss: "Once more."
        example: "They didn't understand the answer, so they asked again."
  - lemma: "against"
    pos: prep
    senses:
      - gloss: "Opposing or disagreeing with sb/sth."
        example: "I am against that proposal. I think it is a bad idea."
      - gloss: "Pressed to."
        example: "He held her head against his chest."
  - lemma: "ago"
    pos: prep
    senses:
      - gloss: "At an earlier time."
        example: "I was there ten years ago."
  - lemma: "aground"
    pos: prep
    senses:
      - gloss: "If a boat runs or goes aground, its bottom goes onto the ground and it is not floating freely anymore."
        example: "The boat ran aground off the coast of Florida and had to be helped to shore."
  - lemma: "ahead"
    pos: prep
    senses:
      - gloss: "You use ahead to talk about something that is in front of you or in the future."
  - lemma: "albeit"
    pos: prep
    senses:
      - gloss: "You use albeit to give more information that weakens earlier information."
        example: "He won the fight, albeit barely."
  - lemma: "all"
    pos: det
    senses:
      - gloss: "All of something is 100% of it, or the entire amount."
        example: "Well, you could stay in bed all day on Friday. And I could take the kids to school."
      - gloss: "All of some things is 100% of them, or every one."
        example: "And then you can go and tell all your friends about it."
  - lemma: "allowing"
    pos: prep
    senses:
      - gloss: "You use allowing for something, to show that you have thought about that thing in making your decision or getting your answer."
        example: "Even allowing for inflation, $3.7 million is too big a change."
  - lemma: "aloft"
    pos: prep
    senses:
      - gloss: "up in the air; flying"
        example: "He walked into the dark room, holding his light aloft."
  - lemma: "alone"
    pos: prep
    senses:
      - gloss: "If you do something alone, you do it without other people."
        example: "She went walking alone because she wanted to think."
      - gloss: "When you talk about something alone, you mean only that thing."
        example: "It will take weeks for the planning alone."
  - lemma: "along"
    pos: prep
    senses:
      - gloss: "If one thing happens along with another, they go together."
        example: "Along with his daughter, he is studying French."
      - gloss: "If you go along with something, you agree with or follow it."
        example: "We're going to go along with your plan."
      - gloss: "You use along to show movement from one end of a long thing towards the other end."
        example: "Along the road were just a few cars."
      - gloss: "If something was true all along, it's true from the beginning."
        example: "He knew the real story all along."
  - lemma: "along with"
    pos: conj
    senses:
      - gloss: "You use along with to add more information."
        example: "We keep both the old ideas along with the new ones."
  - lemma: "alongside"
    pos: prep
    senses:
      - gloss: "You use alongside to talk about something being beside something else."
      - gloss: "You use alongside to talk about something being at the same time as something else."
  - lemma: "although"
    pos: prep
    senses:
      - gloss: "You use although to show that an idea is surprising or different from another idea."
        example: "We decided to take rooms in Longwood house, although we knew we could not really afford the rent there."
  - lemma: "amid"
    pos: prep
    senses:
      - gloss: "You use amid to talk about something happening at the same time as many other things."
        example: "Amid all the riots during the blackout, many stores were looted."
      - gloss: "You use amid to talk about something being in the middle of something else."
  - lemma: "amidst"
    pos: prep
    senses:
      - gloss: "If something is amidst other things, it is in the middle of them."
        example: "She saw the moon rising above the open sea amidst flying clouds."
      - gloss: "If something happens amidst other things, it happens at the same time as them."
        example: "Amdist all the packing and moving, she still had to study."
  - lemma: "among"
    pos: prep
    senses:
      - gloss: "In or into. We say \"between\" about 2 other things, but among about 3 or more other things."
        example: "She was among her friends."
      - gloss: "With a share for each."
        example: "Divide the candy among yourselves."
      - gloss: "By all or with the whole."
  - lemma: "amongst"
    pos: prep
    senses:
      - gloss: "In or into. We say \"between\" 2 other things, but amongst 3 or more other things."
        example: "She was amongst her friends."
      - gloss: "With a share for each."
        example: "Divide the candy amongst yourselves."
      - gloss: "By all or with the whole."
  - lemma: "an"
    pos: det
    senses:
      - gloss: "An is used when you don't expect your listener to identify which thing you mean."
        example: "I just ate an apple."
  - lemma: "and"
    pos: conj
    senses:
      - gloss: "You use and to talk about two things at once."
        example: "I like singing and reading."
      - gloss: "You use and when you are listing a few things and you are now on your last item of the list."
        example: "I like singing, reading, cycling and playing soccer."
      - gloss: "And is used when you are putting some sentences together."
        example: "She came into the store, shouted at the cashier, and left."
      - gloss: "Used to show what happened after something else."
        example: "The alarm went off and I woke up."
  - lemma: "and/or"
    pos: conj
    senses:
      - gloss: "You use and/or when listing things where either or both of them are options. It combines the meaning of the words \"and\" and \"or\"."
        example: "Please list three business and/or personal references."
  - lemma: "another"
    pos: det
    senses:
      - gloss: "Another of something means that there is one more of it."
        example: "Is there another way to do this?"
  - lemma: "ante"
    pos: prep
    senses:
      - gloss: "before"
  - lemma: "ante meridiem"
    pos: prep
    senses:
      - gloss: "Usually abbreviated to a.m., an ante meridiem time is in the morning, i.e., before noon."
        example: "The work day here formally begins at 8:00 ante meridiem."
  - lemma: "anti"
    pos: prep
    senses:
      - gloss: "Against."
        example: "I'm anti the idea of moving the couch there. I think that's a horrible place for it."
  - lemma: "any"
    pos: det
    senses:
      - gloss: "some or even the smallest amount or number"
        example: "Do you want any coffee?"
      - gloss: "it does not matter which"
        example: "Please ask me. I can answer any question."
  - lemma: "anybody"
    pos: det
    senses:
      - gloss: "Any one person out of a number of people."
        example: "I don't care who comes. Anybody will do."
  - lemma: "anyone"
    pos: det
    senses:
      - gloss: "Any person. You use this word when there is no limit to who might be meant. You might be able to change anyone to any person's name."
        example: "Help! Can anyone hear me?"
  - lemma: "anything"
    pos: det
    senses:
      - gloss: "Any one of all things. You use this when there is no limit to what might be meant. You might be able to change \"anything\" to any other word."
        example: "I'll do anything you want."
  - lemma: "anytime"
    pos: det
    senses:
      - gloss: "Anytime is any time at all."
        example: "I have no plans this weekend; I can paint the house anytime."
  - lemma: "anywhere"
    pos: det
    senses:
      - gloss: "(in, at or to) any place"
        example: "I don't have anywhere to go."
  - lemma: "apart"
    pos: prep
    senses:
      - gloss: "If two things are apart, there is space between them."
        example: "Scientists theorize that Pangaea drifted apart into the different continents that exist on Earth today."
      - gloss: "You use something apart to leave that thing out of the topic."
        example: "The lies apart, they're good workers."
  - lemma: "aplenty"
    pos: prep
    senses:
      - gloss: "in abundance"
        example: "While there are amenities aplenty, what makes Surf Simply stand out is the coaching and education."
  - lemma: "apropos"
    pos: prep
    senses:
      - gloss: "related to (a topic)"
        example: "\"My toe is cold,\" he said, apropos of nothing at all."
  - lemma: "around"
    pos: prep
    senses:
      - gloss: "If x is around y, y is in the middle and x is on all sides of y."
        example: "The moon circles around the Earth."
  - lemma: "as"
    pos: prep
    senses:
      - gloss: "A word that is used to compare two things that are equal."
        example: "As you know, we need more workers."
      - gloss: "A word that is used to show that two things happened at the same time."
        example: "Just as I went out, it started to rain."
      - gloss: "A word that is used to show why something happens."
        example: "As I couldn't understand French, I didn't watch the film."
      - gloss: "A word that is used to express concession."
        example: "Interesting as it seems, I don't think I'll get it."
  - lemma: "as for"
    pos: prep
    senses:
      - gloss: "with respect to; in reference to; regarding"
  - lemma: "as from"
    pos: prep
    senses:
      - gloss: "Used to show the time or date when something begins."
        example: "As from November we will be moving to a new location."
  - lemma: "as if"
    pos: prep
    senses:
      - gloss: "In the same way that it would be if."
        example: "It could look as if we're trying to hide something."
      - gloss: "Used in exclamations to say that something is not true."
        example: "\"I'm not going to help anymore.\" \"As if you were helping before!\""
  - lemma: "as long as"
    pos: prep
    senses:
      - gloss: "if"
        example: "As long as you know what you're doing, it should be fine."
  - lemma: "as of"
    pos: prep
    senses:
