    pos: det
    senses:
      - gloss: "ordinal ninety-ninth) Ninety-nine (99) is the odd number that comes before one hundred."
        example: "Ninety-nine apples lay on the table."
  - lemma: "no"
    pos: det
    senses:
      - gloss: "Not any."
