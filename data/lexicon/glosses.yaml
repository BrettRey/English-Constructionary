      - gloss: "Contrary to the opinion of; Used to express polite disagreement"
        example: "Nor, pace Bush, must all countries be with America or against it."
  - lemma: "past"
    pos: prep
    senses:
      - gloss: "by; beside"
        example: "I watched as he walked past the museum window from north to south."
  - lemma: "pending"
    pos: prep
    senses:
      - gloss: "While waiting for something; until."
        example: "Final approval was not given pending agreement on how the money would be spent."
  - lemma: "per"
    pos: prep
    senses:
      - gloss: "for each; during each"
        example: "Double rooms with full breakfast are £40 per person per night."
  - lemma: "pertaining"
    pos: prep
    senses:
      - gloss: "about; related to"
        example: "Pertaining to the suggestions, there is a some advantage in this new approach."
  - lemma: "plus"
    pos: conj
    senses:
      - gloss: "used before the last item in a list"
        example: "I like singing, reading, and tennis plus playing soccer."
      - gloss: "used to show what happened after something else"
        example: "The alarm went off plus I woke up."
  - lemma: "plus"
    pos: prep
    senses:
      - gloss: "You use plus when you add numbers."
        example: "Two plus two is four. (2+2=4)"
      - gloss: "and also"
        example: "The farm has over 5,000 horses, plus a few cats and dogs."
      - gloss: "You use plus after a number to mean more than or over."
        example: "The country has a population of 3 million plus."
  - lemma: "point"
    pos: prep
    senses:
      - gloss: "You use point to introduce decimals in a number that is not an integer."
        example: "The price has gone up by two point five percent (2.5%)."
  - lemma: "post"
    pos: prep
    senses:
      - gloss: "after"
        example: "Post the test results becoming public, there were many complaints."
  - lemma: "post meridiem"
    pos: prep
    senses:
      - gloss: "Usually abbreviated p.m., a post meridiem time is noon or later."
        example: "In the winter, the sun can set as early as 4:30 post meridiem."
  - lemma: "pre"
