  - lemma: "aboveboard"
    pos: prep
    senses:
      - gloss: "If something or someone is aboveboard, they are honest."
      - gloss: "If something is done aboveboard, it is done in an honest way."
  - lemma: "abreast"
    pos: prep
    senses:
      - gloss: "If you keep or stay abreast of something, you regularly read or study the most recent information about it."
        example: "Have you been keeping abreast of the news from Iraq?"
      - gloss: "If two things are abreast, they are side by side."
        example: "They walked in a long line, three abreast."
  - lemma: "abroad"
    pos: prep
    senses:
      - gloss: "If somebody goes abroad, they leave their home country and go to another country."
        example: "They sent their children to school abroad."
      - gloss: "If somebody lives abroad, they live in another country."
        example: "She spent four years abroad before returning to Brazil."
  - lemma: "absent"
    pos: prep
    senses:
      - gloss: "Absent means without or barring."
        example: "Absent any problems, we should be finished in two hours."
  - lemma: "according"
    pos: prep
    senses:
