    senses:
      - gloss: "Our things are things that belong to us."
        example: "We've come in our new car."
  - lemma: "ours"
    pos: pron
    senses:
      - gloss: "If something is ours it belongs to us; the possessive case of we, used without a following noun."
        example: "This land has been ours for years."
  - lemma: "ourselves"
    pos: pron
    senses:
      - gloss: "The reflexive case of we, the first-person plural personal pronoun."
      - gloss: "us (referring to us, when we have already been mentioned)"
        example: "We should keep this for ourselves."
      - gloss: "we (used as an intensifier)"
        example: "We did it ourselves."
  - lemma: "out"
    pos: prep
    senses:
      - gloss: "Something that is out is not in."
        example: "Polly opened the door and went out."
      - gloss: "If something using electricity is out, it is turned off or the electricity is not flowing.."
        example: "Turn the light out before you leave."
      - gloss: "Something that moves out moves from the inside to a place that is not inside."
        example: "He took the pen out of his pocket."
      - gloss: "far away"
        example: "We live out in the country."
  - lemma: "outdoors"
    pos: prep
    senses:
      - gloss: "If something is outdoors, it is not in a building; under the open sky."
  - lemma: "outside"
    pos: prep
    senses:
      - gloss: "outdoors; not in a building; under the open sky"
        example: "The plants are outside the house."
  - lemma: "outward"
    pos: prep
    senses:
      - gloss: "moving or facing out"
  - lemma: "outwards"
    pos: prep
    senses:
      - gloss: "moving or facing out."
  - lemma: "over"
    pos: prep
    senses:
      - gloss: "In a location above something."
        example: "He stepped over the dog."
      - gloss: "From one side to the other."
        example: "They went over the bridge."
      - gloss: "A number divided by another."
        example: "Eight over two is four."
      - gloss: "If you do something over, you do it again."
        example: "That looks really bad. I think we need to do it over."
  - lemma: "overboard"
    pos: prep
    senses:
      - gloss: "If someone or something goes overboard, it goes over the side of a boat."
        example: "When they threw the cut fish overboard, the sharks attacked."
  - lemma: "overhead"
    pos: prep
    senses:
      - gloss: "above your head; in the sky"
  - lemma: "overland"
    pos: prep
    senses:
      - gloss: "by land, not air or sea"
        example: "The mail traveling overland to the small towns could take weeks."
  - lemma: "overnight"
    pos: prep
    senses:
      - gloss: "Period between midnight to dawn."
        example: "She went on an overnight trip to visit her mother."
  - lemma: "overseas"
    pos: prep
    senses:
      - gloss: "If something is overseas, it is in a different country, usually across the ocean."
        example: "After university she went overseas to teach."
      - gloss: "The overseas markets, students, etc. are in or from a different country, usually across an ocean."
        example: "Wang is an overseas student from China."
  - lemma: "owing"
    pos: prep
    senses:
      - gloss: "You use owing to x, y to show that x is the reason for y."
        example: "Owing to the problems, we have not been able to finish."
