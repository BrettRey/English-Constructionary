      - gloss: "ordinal thirty-second) The number 32."
        example: "There are thirty-two tennis balls in the basket."
  - lemma: "this"
    pos: det
    senses:
      - gloss: "You use this to show which thing or idea you are talking about. You use it when the thing or idea is close to you."
        example: "This trip was a great idea."
      - gloss: "The thing indicated without mentioning the noun."
        example: "This is my hand."
