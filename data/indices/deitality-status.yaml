    - the
    - this
    - that
    - these
    - those
    - "personal genitives (my, your, ...)"
    - "genitive NPs in determiner function (John's)"
    - "(the) most/fewest/least (referential)"
    - last
    - next
    - said
  mixed:
    - each
    - every
    - all
    - both
    - either
    - neither
    - "whatever (free-choice)"
    - "whichever (free-choice)"
  non-deital:
