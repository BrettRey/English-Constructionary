# Provisional deitality inventory, transcribed from Reynolds, Definiteness and
# Deitality in English (under review at Journal of Linguistics; LingBuzz 009369),
# appendix table. Author judgments intended to make the profile auditable; only
# the core contrasts are used as evidence in the paper. Diagnostics, ranked:
# there-resistance, partitive domain establishment, identificational hosting
# (bare-one substitution as corroborating residue). See deitality-001.
source:
  paper: "Definiteness and Deitality in English: A Projectibility-First Account"
  preprint: "https://ling.auf.net/lingbuzz/009369"
  status-as-of: "2026-07-16"
statuses:
