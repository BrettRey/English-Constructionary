id: goal-complement-001
name: Goal Locative-Complement Construction
pattern: "Head:V + Comp:PP[locative, goal]"
type: syntactic
semanticType: predication
dimensions:
  form: "Verb head with a goal-denoting PP in locative-complement function; the PP may be transitive or complementless"
  meaning: "Directed motion toward a final location; the frame can impose the motion reading"
  function: "Locative complement of the verb, bearing the semantic role goal"
  distribution: "VP-internal with motion verbs and constructionally coerced manner or emission verbs"
meanings:
  '1':
    definition: A VP contains a locative complement bearing the goal role, yielding directed motion toward a final location
    details: "Goal is a semantic role, while locative complement is the CGEL syntactic function. Realizations include to-PPs (go to the shop), directional PPs (run into the garden), and one-word PPs headed by complementless prepositions (go home, head abroad). *Go to home is excluded by to's NP-object complementation, not by the goal construction (CGEL pp. 257–59)."
    examples:
      - form: "go [to the shop]"
        note: Goal-role locative complement headed by transitive to
      - form: "go [to church]"
        note: To-PP with a bare institutional NP object
      - form: "go [home]"
        note: Goal-role locative complement realized by a one-word PP
      - form: "The sailors went [ashore]."
        note: Complementless-P realization of the goal slot
  '2':
    definition: The frame coerces a directed-motion reading onto a verb without lexical direction or goal semantics
    details: "This is the constructional residue: the verb contributes manner or emission while the frame supplies motion and the goal (Goldberg 1995, intransitive-motion construction)."
    examples:
      - form: "The bottle floated [into the cave]."
        note: The frame supplies directed motion toward the goal
      - form: "The fly buzzed [into the room]."
        note: Sound-emission verb coerced into motion
      - form: "She danced [into the hall]."
        note: Activity verb with frame-supplied goal
constraints:
  - type: syntactic
    description: "The PP is integrated as a locative complement in the directed-motion VP, not added as a locative adjunct."
  - type: semantic
    description: "When the verb does not lexically encode direction or a goal, the frame supplies the directed-motion relation while the verb contributes manner or emission."
kind:
  provisional: true
  projection:
    target: "Locating a VP in the goal-locative-complement frame predicts a directed-motion interpretation even when the verb lacks lexical direction or goal semantics, and predicts the goal slot's realizational range across to-PPs, directional PPs, and one-word locative PPs"
    evidence: "Manner and emission verbs acquire directed-motion readings in this frame, while the realizational range holds across lexical motion and coerced cases (Goldberg 1995; CGEL pp. 257–59)"
    confidence: medium
  secured: stable
  profile:
    core:
      - property: Goal-role PP in locative-complement function
        diagnostics: ["final-location interpretation", "integration in the motion frame"]
        weight: high
      - property: Constructional coercion
        diagnostics: ["manner or emission verbs acquire directed-motion readings"]
        weight: high
  boundaries:
    known_boundary_items:
      - "off, back, or down followed by a to-PP: the sequence may contain two separate PP complements because each first P also has a complementless use"
      - "from under the bed proves only that from can take a PP complement; it does not establish PP-internal goal complementation"
      - "the way construction: related but distinct frame"
      - "caused motion: transitive sister frame with an Od theme"
  grain:
    level: meso
    parent_families:
      - argument-structure
relatedConstructions:
  - id: pp-001
    relationship: contains
    parthood: formal
    notes: The goal-role locative complement is a PP
  - id: source-complement-001
    relationship: related-to
    notes: Sister semantic roles within the locative-complement family
lexiconRefs:
  - gold/prepositions
