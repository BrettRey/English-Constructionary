id: goal-complement-001
name: Goal Complement
pattern: "V + PP[goal]"
type: syntactic
dimensions:
  form: "Verb with a goal-denoting PP complement; the PP may be headed by a transitive preposition (to the shop, into the cave) or a bare intransitive preposition (home, abroad, ashore)"
  meaning: "Directed motion toward a goal; the frame can impose the motion reading"
  function: "Goal complement of the verb"
  distribution: "Motion verbs (go, come, head, run, arrive) and, by coercion, manner verbs without lexical motion semantics"
meanings:
  '1':
    definition: A verb takes a goal-denoting PP complement, yielding directed motion toward the goal
    details: "Realizations of the goal slot are equal citizens: to-PPs (go to the shop), directional PPs (run into the garden), and bare PPs headed by intransitive prepositions (go home, head abroad). *go to home is ruled out by to's NP-only complementation, not by this construction."
    examples:
      - form: "go [to the shop]"
        note: Transitive-preposition goal
      - form: "go [home]"
        note: Goal realized by a bare PP headed by the intransitive preposition home
      - form: "The sailors went [ashore]."
        note: Bare-PP goal
  '2':
    definition: The frame coerces a directed-motion reading onto verbs without lexical motion semantics
    details: "The constructional residue: manner verbs contribute manner while the frame supplies the motion and the goal (Goldberg 1995, the intransitive motion construction). This licensing does not follow from any lexeme's category or valency, which is what earns the frame its own entry."
    examples:
      - form: "The bottle floated [into the cave]."
        note: Float has no lexical goal argument; the frame supplies directed motion
      - form: "The fly buzzed [into the room]."
        note: Sound-emission verb coerced into motion
      - form: "She danced [into the hall]."
        note: Manner-of-motion verb with frame-supplied goal
constraints:
  - type: syntactic
    description: The goal is a complement, not an adjunct; it is selected in the directed-motion frame.
  - type: semantic
    description: With non-motion verbs, the frame supplies the motion semantics (coercion); the verb contributes manner.
kind:
  provisional: true
  projection:
    target: "Locating a clause in the goal-complement frame predicts a directed-motion interpretation even when the verb lacks lexical motion semantics, and predicts the goal slot's realizational range (to-PP, directional PP, bare intransitive-P PP)"
    evidence: "Manner-verb coercion (float/buzz/dance + path PP) is not derivable from the verbs' lexical entries or from selection; realizational range holds across the motion verbs and the coerced cases (Goldberg 1995)"
    confidence: medium
  secured: stable
  profile:
    core:
      - property: "Goal PP as complement"
        diagnostics: ["selected in the motion frame", "not omissible without changing the frame"]
        weight: high
      - property: "Coercion of non-motion verbs"
        diagnostics: ["manner verbs acquire directed-motion readings in the frame"]
        weight: high
  stabilisers:
    - type: entrenchment
      evidence: "Very high frequency of go/come + goal anchors the frame"
  boundaries:
    known_boundary_items:
      - "the way-construction (She elbowed her way in): related but distinct frame"
      - "caused-motion (He sneezed the napkin off the table): transitive sister frame"
      - "here/there as deictic goals (wider distribution; classification pending)"
relatedConstructions:
  - id: intransitive-preposition-001
    relationship: contains
    parthood: formal
    notes: Bare intransitive prepositions (home, abroad, ashore) are one realization of the goal slot
  - id: preposition-001
    relationship: related-to
lexiconRefs:
  - gold/prepositions
