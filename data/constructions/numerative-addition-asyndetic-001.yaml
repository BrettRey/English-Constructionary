id: numerative-addition-asyndetic-001
name: Numerative Addition Coordination (without and)
pattern: "[DP magnitude] + [DP/NP addition]"
type: syntactic
dimensions:
  form: "Asyndetic coordination; juxtaposition without 'and'"
  meaning: "Same additive semantics as syndetic variant"
  function: "Builds complex numeratives recursively"
  distribution: "Preferred in AmE; faster/less formal registers"
meanings:
  '1':
    definition: Additive numerative formed by juxtaposing magnitude and addition without and
    examples:
      - form: two hundred five
        note: 200 + 5 (asyndetic addition)
      - form: two thousand seven
        note: 2000 + 7 (asyndetic addition)
constraints:
  - type: structural
    description: Coordination targets numerative constituents; the coordinator and is omitted.
  - type: structural
    description: "Recursive: the addition coordinate can itself be a basic numerative or a magnitude phrase; its category may be DP or NP (category difference is tolerated under likeness of function)."
  - type: pragmatic
    description: Strongly preferred in AmE and in faster or less formal registers.
formRefs:
  - numerative-addition-coordination
semanticRefs:
  - cardinality
  - additive-composition
syntacticRefs:
