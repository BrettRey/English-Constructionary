id: preposition-001
name: Preposition
pattern: P
type: syntactic
dimensions:
  form: "Mostly short, closed-class lexemes; no inflection"
  meaning: "Relates an entity or situation to another in space, time, or abstract structure"
  function: "Head of PP; PPs serve as complements, modifiers, and adjuncts"
  distribution: "NP objects and other complements are optional for much of the class; a few exceptional heads follow their complement"
meanings:
  '1':
    definition: Lexical category heading preposition phrases, with optional complements for much of the class
    details: "The CGEL category is much larger than the traditional one: it includes the traditional prepositions (in, on, of), objectless members traditionally called adverbs (home, abroad, ashore, upstairs; ago, with its obligatory pre-head measure modifier), the rare complement-head members (notwithstanding), and clause-taking members traditionally called subordinating conjunctions (because, although, while). See data/lexicon/gold/prepositions.yaml for the curated inventory."
    examples:
      - form: "[in] the garden"
        note: "Transitive: the garden bears the object function within the PP"
      - form: "She waited [outside]."
        note: Intransitive use (no object)
      - form: "ten years [ago]"
        note: "Intransitive, with an obligatory pre-head measure modifier (cf. ten years before Christ); the Constructionary rejects CGEL's complement analysis on p. 632"
      - form: "[because] it rained"
        note: Clause complement (traditional subordinating conjunction)
constraints:
  - type: syntactic
    description: Heads a PP; accepts right/straight modification in locative uses (right outside, straight home).
kind:
  provisional: true
  projection:
    target: "Category membership predicts PP distribution (goal and locative complement positions, from-embedding for locative members, modifier positions), right/straight modifiability for locatives, and non-inflection"
    evidence: "Distributional convergence across the traditional prepositions, the intransitive members, and the clause-taking members (CGEL Ch. 7)"
    confidence: medium
  secured: stable
lexiconRefs:
  - gold/prepositions
