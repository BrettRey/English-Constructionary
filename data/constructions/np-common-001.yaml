id: np-common-001
name: Common Noun Phrase
pattern: 'NP[N-Type: Common]'
type: syntactic
meanings:
  '1':
    definition: NP whose nominal head is a common noun; compatible with definite or indefinite, and unique or non-unique, reference
    examples:
      - form: dog
        note: General reference to the kind
      - form: the books
        note: Specific reference to a set of books
constraints:
  - type: syntactic
    description: The nominal head must be a common noun
semanticType: reference
relatedConstructions:
  - id: np-001
    relationship: inherits-from
  - id: np-bare-001
    relationship: specialization-of
  - id: np-det-001
    relationship: specialization-of
