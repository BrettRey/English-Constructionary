id: intransitive-preposition-001
name: Intransitive Preposition Use
pattern: "Head:P (no Obj:NP; + optional non-object Comp)"
type: syntactic
dimensions:
  form: "Preposition heading a PP without an NP object; it may be complementless or take a PP, clause, or predicative complement"
  meaning: "Varies with the head and complement: location, direction, time, reason, comparison, and other relations"
  function: "Heads an intransitive PP in complement, modifier, adjunct, or predicative function"
  distribution: "The full CGEL objectless class; complementless locative members occupy the same PP positions as full locative PPs"
meanings:
  '1':
    definition: A preposition used without an NP object, whether or not it has another kind of complement
    details: "Intransitive means no object, not no complement. A complementless member such as outside heads a one-word PP, but an intransitive preposition may instead take a PP complement (owing to the rain), a predicative complement (as satisfactory), or a clause complement (because it rained). The category remains preposition throughout (CGEL p. 272)."
    examples:
      - form: "She waited [outside]."
        note: Complementless intransitive use; the same lexeme also has transitive outside the door
      - form: "This happened [owing [to the rain]]."
        note: Intransitive preposition with a PP complement
      - form: "That counts [as satisfactory]."
        note: Intransitive preposition with a predicative complement
      - form: "We left [because it rained]."
        note: Intransitive preposition with a clause complement
      - form: "Bill slept the afternoon [away]."
        note: Complementless intransitive preposition heading a one-word PP in particle use
constraints:
  - type: syntactic
    description: "The head has no NP object in this use; the presence of a non-object complement does not make the PP transitive."
  - type: syntactic
    description: "Within the complementless locative subset, right/straight modification and from-embedding help distinguish PPs from AdvPs (right outside, straight home, from abroad)."
relatedConstructions:
  - id: preposition-001
    relationship: specialization-of
    parthood: formal
lexiconRefs:
  - gold/prepositions
