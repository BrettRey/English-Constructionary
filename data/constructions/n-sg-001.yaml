id: n-sg-001
name: Singular Noun
pattern: N[Number:SG]
type: syntactic
meanings:
  '1':
    definition: Singular number form; selects singular agreement and singular-selecting determinatives. Typically construes the referent as a single unit, but the category is morphosyntactic, not semantic
    examples:
      - form: cat
        note: Single countable entity
      - form: book
        note: Singular count noun
