id: ostensive-np-001
name: Ostensive NP
pattern: "NP[extra-clausal, attention-directing]"
type: syntactic
dimensions:
  form: "Extra-clausal NP with marked prosody; NP-internal licensing is preserved but differs between vocative and directive-ostensive packaging"
  meaning: "Directs attention to a referent (addressee or environmental)"
  function: "Attention-securing utterance; not an argument of any predicator"
  distribution: "Stand-alone or supplement position; resists embedding, tags, and questioning"
meanings:
  '1':
    definition: An extra-clausal NP whose utterance directs attention to its referent, with packaging-specific NP-internal syntax preserved
    details: "The structural parent of vocative-001 (addressee-directed: securing the channel) and directive-ostensive-001 (environment-directed: securing joint attention). Ordinary determination applies in the directive-ostensive packaging, while vocative function independently licenses bare common-noun NPs such as Mum, driver, officer, and buddy (CGEL pp. 522–23). The packagings shade into each other: Taxi! is ambiguous between hailing the driver and alerting companions, and reminders (Your keys!) sit between alerting and addressing. The construction cross-cuts exclamation-001: tag vocatives instantiate this profile without exclamatory force."
    examples:
      - form: "[Mom]! (calling)"
        note: Vocative packaging (addressee-directed)
      - form: "[A snake]!"
        note: Directive-ostensive packaging (environment-directed)
      - form: "[Taxi]!"
        note: Boundary case, ambiguous between the two packagings
constraints:
  - type: syntactic
    description: "Determination is packaging-sensitive: directive-ostensives preserve ordinary determination (a snake, the bus), while vocative function licenses restricted bare common-noun NPs (Mum, driver, buddy)."
  - type: syntactic
    description: Not selected by any predicator; resists embedding, tags, and question formation.
kind:
  provisional: true
  projection:
    target: "Membership predicts packaging-specific NP syntax despite extra-clausal status, introduction of a discourse referent available to anaphora, an orientation-type rather than verbal response, and marked prosody"
    evidence: "Directive-ostensives preserve ordinary determination where block language sheds it, while vocatives license a restricted bare-NP inventory (CGEL pp. 522–23); both packagings retain referential and orientation behaviour unlike interjections"
    confidence: medium
  secured: stable
  profile:
    core:
      - property: "Extra-clausal status"
        diagnostics: ["not selected by verb", "resists embedding and tags"]
        weight: high
      - property: "Packaging-specific NP-internal grammar"
        diagnostics: ["ordinary determination in directive-ostensives", "licensed bare common nouns in vocatives"]
        weight: high
      - property: "Attention-directing function"
        diagnostics: ["secures channel or joint attention", "licenses orientation response"]
        weight: high
      - property: "Discourse-referent introduction"
        diagnostics: ["referent available to subsequent anaphora"]
        weight: medium
  stabilisers:
    - type: functional-pressure
      evidence: "Attention-securing must be fast; minimal structure with maximal prosodic salience"
    - type: acquisition
      evidence: "Plausibly continuous with pre-linguistic pointing and the one-word stage; testable in CHILDES"
  boundaries:
    overlaps_with:
      - exclamation-001
    known_boundary_items:
      - "Taxi! (vocative/directive-ostensive ambiguity)"
      - "block language (form without prosody or determination)"
      - "clausal alerts (There's a fire!: function without the form)"
  grain:
    level: meso
    parent_families:
      - np
relatedConstructions:
  - id: np-001
    relationship: specialization-of
    parthood: formal
  - id: exclamation-001
    relationship: overlaps-with
    overlap-dimension: functional
