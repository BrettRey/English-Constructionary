id: n-common-pl-001
name: Plural Common Noun
pattern: N[Type:Common, Number:PL]
type: syntactic
meanings:
  '1':
    definition: Plural-marked common noun; plural agreement and determinative selection. Typically denotes more than one instance, though lexicalized and non-canonical plurals diverge
    examples:
      - form: dogs
        note: Plural count noun
      - form: cities
        note: Plural common noun
