id: interrogative-word-001
name: Interrogative Use of Indeterminates
pattern: who/whom/whose/what/which/where/when/why/how (interrogative packaging)
type: semantic
dimensions:
  form: "Full indeterminate series; fronted in open interrogatives"
  meaning: "The open variable is packaged as a request for its value"
  function: "Marks the focus of the question; question-answer congruence"
  distribution: "Main-clause interrogatives (with subject-auxiliary inversion) and subordinate interrogatives"
meanings:
  '1':
    definition: Asks for the value of the indeterminate's open variable, constraining its sort
    details: All members of the indeterminate series participate in this packaging
    examples:
      - form: "[whose] book"
        note: Seeks possessor identification
      - form: "[who] came"
        note: Seeks agent identification
      - form: "I wonder [where] she went."
        note: Subordinate interrogative
constraints:
  - type: syntactic
    description: Interrogative fronting; the interrogative property percolates upward from the indeterminate to its phrase and clause.
semanticRefs:
  - question-clause
  - variable
formRefs:
  - indeterminate-series
relatedConstructions:
  - id: indeterminate-word-001
    relationship: specialization-of
    parthood: semantic
  - id: echo-question-001
    relationship: related-to
  - id: deitality-001
    relationship: see-also
    notes: Deitality diagnostics are largely undefined for fronted interrogatives (clause-type dependent)
