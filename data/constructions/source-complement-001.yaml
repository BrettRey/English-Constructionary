id: source-complement-001
name: Source Locative-Complement Construction
pattern: "Head:V + Comp:PP[locative, source]"
type: syntactic
semanticType: predication
dimensions:
  form: "Verb head with a source-denoting PP in locative-complement function, headed centrally by from, away, off, or out"
  meaning: "Origin or initial location of motion, derivation, or change"
  function: "Locative complement of the verb, bearing the semantic role source"
  distribution: "VP-internal with motion and change verbs; compatible with a following goal-role locative complement"
meanings:
  '1':
    definition: A VP contains a locative complement bearing the source role, marking the initial location of motion or change
    details: "Source is a semantic role, while locative complement is the CGEL syntactic function. Source complements are generally headed by from, away, off, or out. From takes an NP or locative-PP complement; the inner PP in from under the bed expresses the source location and is not another source complement. Away occurs alone or with a from-PP complement; off occurs alone or with an NP object; out occurs alone or with an of- or from-PP complement (CGEL pp. 257–59, 687)."
    examples:
      - form: "She came [from Toronto]."
        note: From-PP in source-role locative-complement function
      - form: "Ed emerged [from [under the car]]."
        note: "The whole from-PP is the source-role locative complement; the inner PP expresses the source location"
      - form: "She walked [away]."
        note: Complementless away-PP bearing the source role
      - form: "Kim jumped [off the pier]."
        note: Off-PP bearing the source role
      - form: "He came [out of the room]."
        note: Out-PP bearing the source role
      - form: "They flew [from Toronto] [to Ottawa]."
        note: Source- and goal-role locative complements co-occurring
constraints:
  - type: syntactic
    description: "The whole source-denoting PP is integrated as a locative complement of the verb, not added as a locative adjunct."
  - type: semantic
    description: "The complement denotes the initial location or state and can co-occur with a separate goal-role locative complement."
kind:
  provisional: true
  projection:
    target: "An integrated motion or change VP containing a locative PP headed by from, away, off, or out predicts an initial-location construal, head-specific complementation, and compatibility with a separate goal-role complement"
    evidence: "CGEL gives the four-head realization inventory and its distinct complement patterns on p. 687; spatial, state, and possession examples distinguish initial-location source from final-location goal on pp. 258–60"
    confidence: medium
  secured: stable
  profile:
    core:
      - property: Source role borne by a locative PP complement
        diagnostics: ["initial-location interpretation", "integration in a motion or change frame"]
        weight: high
      - property: Overt source marking
        diagnostics: ["from, away, off, or out as PP head", "head-specific object or PP complementation"]
        weight: high
    peripheral:
      - property: Source-goal co-occurrence
        diagnostics: ["from Toronto to Ottawa", "from bad to worse"]
        weight: medium
  boundaries:
    known_boundary_items:
      - "path or route complements such as through the tunnel and via Chicago: a third locative-role family member, with no entry yet"
      - "derivational sources such as made from grapes: extension beyond literal motion"
  grain:
    level: meso
    parent_families:
      - argument-structure
relatedConstructions:
  - id: pp-001
    relationship: contains
    parthood: formal
    notes: The source-role locative complement is a PP headed centrally by from, away, off, or out
  - id: goal-complement-001
    relationship: related-to
    notes: Sister semantic roles within the locative-complement family
lexiconRefs:
  - gold/prepositions
