id: source-complement-001
name: Source Complement
pattern: "V/P + PP[source]"
type: syntactic
dimensions:
  form: "Source-denoting PP complement, overwhelmingly from-headed"
  meaning: "Origin of motion or derivation"
  function: "Source complement of a verb or of a preposition"
  distribution: "VP-internal (came from Toronto), PP-internal (out from under the bed), and recursively within from-PPs (from [under the bed])"
meanings:
  '1':
    definition: A verb or preposition takes a source-denoting PP complement, marking the origin of motion
    details: "At the verb/path-preposition host level the source slot is from-headed almost without exception, unlike the goal slot's wider realizational range. The function recurs inside the from-PP: from's own complement (an NP like Toronto or a locative PP like under the bed) is itself a source complement specifying the source region, so out from under the bed stacks the function twice. The inner relation is forced: from is never intransitive, so under the bed must be its complement, which proves that prepositions take PP source complements. The outer attachment (from-PP as complement of out versus as a separate PP alongside it) is not forced, since out has intransitive uses; that layer shares the indeterminacy of the goal-side off to school cases. Source and goal complements co-occur freely in one frame (flew from Toronto to Ottawa)."
    examples:
      - form: "She came [from Toronto]."
        note: VP-internal source complement
      - form: "out [from under the bed]"
        note: "From-PP in the source frame; whether it is a complement of out or a separate PP is not forced (out has intransitive uses)"
      - form: "out from [under the bed]"
        note: "The forced case: from is never intransitive, so under the bed must be its source complement - the proof that P takes PP source complements"
      - form: "They flew [from Toronto] [to Ottawa]."
        note: Source and goal complements co-occurring
constraints:
  - type: syntactic
    description: The source PP is a complement of its verb or preposition host, not an adjunct.
  - type: semantic
    description: Denotes origin of motion or derivation; pairs with goal complements in the full path frame.
kind:
  provisional: true
  projection:
    target: "Locating a PP in the source slot predicts from-headedness at the verb/path-preposition host level, recursive source specification inside the from-PP (NP or locative PP complement of from), free co-occurrence with a goal complement in the same frame, and availability in both VP and PP hosts"
    evidence: "from-headedness is near-exceptionless where the goal slot ranges over to/into/onto and bare PPs; the two-host distribution is attested in both directions (came from Toronto; out from under the bed)"
    confidence: medium
  secured: stable
  profile:
    core:
      - property: "From-headed PP in complement function"
        diagnostics: ["selected by motion verbs and path prepositions", "not omissible without changing the frame"]
        weight: high
      - property: "Two host types"
        diagnostics: ["VP-internal and PP-internal occurrence"]
        weight: medium
  boundaries:
    known_boundary_items:
      - "path/route complements (through the tunnel, via Chicago): third member of the path family, no entry yet"
      - "derivational sources (made from grapes): motion metaphor, classification pending"
relatedConstructions:
  - id: pp-001
    relationship: contains
    parthood: formal
    notes: The source slot is a PP (from-headed)
  - id: goal-complement-001
    relationship: related-to
    notes: Sister path complements; freely co-occurring (from Toronto to Ottawa), not alternating
lexiconRefs:
  - gold/prepositions
