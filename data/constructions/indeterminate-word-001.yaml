id: indeterminate-word-001
name: Indeterminate Word
pattern: who/whom/whose/what/which/where/when/why/how (+ the -ever series)
type: semantic
dimensions:
  form: "Closed series sharing historical wh- orthography (how included); internal paradigm structure (whose, whom as case forms of who); productive -ever derivation"
  meaning: "Contributes an open variable restricted to a sort (person, thing, selection, possessor, place, time, reason, manner/degree)"
  function: "Feeds interrogative, relative, and exclamative packagings; the marked property percolates upward, with non-subject fronting where the packaging requires it"
  distribution: "Availability and lexical category vary by member and packaging; non-subject phrases are fronted in the relevant constructions"
meanings:
  '1':
    definition: Contributes an open variable restricted to a sort, available to different clause-type packagings
    details: "Term: indeterminate (cf. Kuroda 1965 for the Japanese analogue). Not a CGEL lexical category: the set cross-cuts lexical categories, and category may differ by packaging—interrogative what is a determinative, whereas exclamative what is an adjective; how is adverbial. Three projections support the overarching set: (i) sortal-variable semantics across packagings; (ii) upward percolation of the interrogative, relative, or exclamative property, plus non-subject fronting where required; (iii) the -ever series (whoever, whatever, whichever, wherever, whenever, however) derives from this base set. Packaging-specific category facts live in the specialization entries and lexicon layer."
    examples:
      - form: "[what] she saw"
        note: Open variable over things (fused relative packaging)
      - form: "[who] came"
        note: Open variable over persons (interrogative packaging)
    relations:
      - 1
  '2':
    definition: Marks scalar degree, a point or extent on an implicit or explicit scale
    details: Degree is one of the sorts the series ranges over
    examples:
      - form: "[how] tall"
        note: Degree of height
      - form: "[what] speed"
        note: Extent of velocity
    relations:
      - 1
      - 2
relations:
  '1':
    construction: np-001
    type: can-manifest-as
  '2':
    construction: degree-001
    type: can-manifest-as
formRefs:
  - indeterminate-series
semanticRefs:
  - variable
relatedConstructions:
  - id: deitality-001
    relationship: interfaces-with
    notes: "Deitality status varies by packaging: ignorance-reading fused relatives pattern deitally; free-choice readings are mixed; exclamative uses are non-deital (Reynolds, deitality inventory)"
lexiconRefs:
  - gold/pronouns
  - gold/determinatives
